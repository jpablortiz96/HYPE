<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .bg { fill: #0B0E13; }
      .panel { fill: #10141C; stroke: #1E2532; stroke-width: 2; rx: 14; }
      .panel2 { fill: #151A24; stroke: #1E2532; stroke-width: 2; rx: 10; }
      .amber { fill: #FFB300; }
      .paper { fill: #EAE6DA; }
      .mut { fill: #8B93A3; }
      .green { fill: #2CE08B; }
      .line { stroke: #FFB300; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #485163; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
      text { font-family: "IBM Plex Mono", Consolas, monospace; }
      .title { font-family: Arial, sans-serif; font-weight: 800; font-size: 34px; }
      .h { font-weight: 700; font-size: 18px; letter-spacing: 2px; }
      .t { font-size: 15px; }
      .s { font-size: 13px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FFB300"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#485163"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="920"/>
  <text x="70" y="62" class="title paper">HYPE - The Culture Exchange</text>
  <text x="70" y="91" class="t amber">Vercel + Amazon Aurora DSQL architecture</text>
  <text x="70" y="118" class="s mut">Play money. Real database guarantees. The ledger never lies.</text>

  <rect x="60" y="160" width="330" height="610" class="panel"/>
  <text x="90" y="200" class="h amber">BROWSER</text>
  <rect x="90" y="230" width="270" height="84" class="panel2"/>
  <text x="112" y="260" class="t paper">Next.js pages</text>
  <text x="112" y="286" class="s mut">/, /market, /asset/CORRIDO</text>
  <text x="112" y="306" class="s mut">/portfolio, /ledger, /pro</text>
  <rect x="90" y="340" width="270" height="84" class="panel2"/>
  <text x="112" y="370" class="t paper">Culture surfaces</text>
  <text x="112" y="396" class="s mut">Trend IPOs, campaigns</text>
  <text x="112" y="416" class="s mut">leagues, profiles</text>
  <rect x="90" y="450" width="270" height="84" class="panel2"/>
  <text x="112" y="480" class="t paper">Client polling</text>
  <text x="112" y="506" class="s mut">SWR market, me, integrity</text>
  <text x="112" y="526" class="s mut">Live ticker and proof badge</text>
  <rect x="90" y="560" width="270" height="84" class="panel2"/>
  <text x="112" y="590" class="t paper">Session</text>
  <text x="112" y="616" class="s mut">HMAC signed cookie</text>
  <text x="112" y="636" class="s mut">Instant guest account</text>

  <rect x="470" y="160" width="460" height="610" class="panel"/>
  <text x="500" y="200" class="h amber">VERCEL SERVERLESS</text>
  <rect x="500" y="230" width="180" height="96" class="panel2"/>
  <text x="522" y="260" class="t paper">Read APIs</text>
  <text x="522" y="286" class="s mut">market, asset</text>
  <text x="522" y="306" class="s mut">pro, scout</text>
  <rect x="720" y="230" width="180" height="96" class="panel2"/>
  <text x="742" y="260" class="t paper">Product APIs</text>
  <text x="742" y="286" class="s mut">campaigns</text>
  <text x="742" y="306" class="s mut">leagues, profile</text>
  <rect x="500" y="365" width="400" height="114" class="panel2"/>
  <text x="522" y="398" class="t paper">/api/trade - Settlement Engine</text>
  <text x="522" y="425" class="s mut">BigInt micro-units, bonding curve math</text>
  <text x="522" y="445" class="s mut">Rollback + OCC retry + fresh recompute</text>
  <rect x="500" y="515" width="400" height="96" class="panel2"/>
  <text x="522" y="548" class="t paper">/api/integrity - Proof of Solvency</text>
  <text x="522" y="575" class="s mut">sum cash + reserves === granted</text>
  <text x="522" y="595" class="s mut">reserve === reserveAt(base, slope, supply)</text>
  <rect x="500" y="645" width="400" height="76" class="panel2"/>
  <text x="522" y="676" class="t paper">/api/list - Trend IPO</text>
  <text x="522" y="703" class="s mut">New curve starts supply 0, reserve 0</text>

  <rect x="1010" y="160" width="330" height="610" class="panel"/>
  <text x="1040" y="200" class="h amber">AWS DATA LAYER</text>
  <rect x="1040" y="240" width="270" height="120" class="panel2"/>
  <text x="1062" y="272" class="t paper">Amazon Aurora DSQL</text>
  <text x="1062" y="300" class="s mut">PostgreSQL-compatible</text>
  <text x="1062" y="320" class="s mut">ACID transactions</text>
  <text x="1062" y="340" class="s mut">Optimistic concurrency</text>
  <rect x="1040" y="395" width="270" height="96" class="panel2"/>
  <text x="1062" y="427" class="t paper">IAM auth</text>
  <text x="1062" y="454" class="s mut">@aws-sdk/dsql-signer</text>
  <text x="1062" y="474" class="s mut">Short-lived DB tokens</text>
  <rect x="1040" y="526" width="270" height="126" class="panel2"/>
  <text x="1062" y="558" class="t paper">DSQL-shaped schema</text>
  <text x="1062" y="585" class="s mut">App UUIDs, no sequences</text>
  <text x="1062" y="605" class="s mut">No FK dependency</text>
  <text x="1062" y="625" class="s mut">CREATE INDEX ASYNC</text>

  <path d="M390 275 C420 275 440 275 470 275" class="line"/>
  <path d="M390 492 C420 492 440 418 470 418" class="line"/>
  <path d="M390 602 C420 602 440 682 470 682" class="soft"/>
  <path d="M930 283 C960 283 980 300 1010 300" class="line"/>
  <path d="M930 421 C960 421 980 300 1010 300" class="line"/>
  <path d="M930 565 C960 565 980 300 1010 300" class="line"/>
  <path d="M930 683 C960 683 980 300 1010 300" class="soft"/>

  <rect x="160" y="810" width="1080" height="58" class="panel2"/>
  <text x="188" y="844" class="t green">Invariant:</text>
  <text x="305" y="844" class="t paper">sum(user.cash) + sum(asset.reserve) === sum(user.granted)</text>
  <text x="820" y="844" class="t amber">and</text>
  <text x="870" y="844" class="t paper">asset.reserve === reserveAt(base, slope, supply)</text>
</svg>
